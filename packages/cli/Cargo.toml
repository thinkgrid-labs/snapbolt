[package]
name = "snapbolt-cli"
version = "0.1.0"
edition = "2021"
description = "Native high-speed image processing CLI for Snapbolt"
repository = "https://github.com/ThinkGrid-Labs/snapbolt"

[lib]
 crate-type = ["cdylib"]

[dependencies]
napi = { version = "2.16", features = ["async"] }
napi-derive = "2.16"
walkdir = "2.3"
rayon = "1.7"
tokio = { version = "1.28", features = ["full"] }
snapbolt-core = { path = "../core" }

[build-dependencies]
napi-build = "2.1"

[dev-dependencies]
tempfile = "3"
