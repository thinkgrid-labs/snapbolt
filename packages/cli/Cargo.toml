[package]
name = "opti-assets-cli"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2.16", features = ["async"] }
napi-derive = "2.16"
walkdir = "2.3"
rayon = "1.7"
tokio = { version = "1.28", features = ["full"] }
opti-assets-core = { path = "../core" }

[build-dependencies]
napi-build = "2.1"
