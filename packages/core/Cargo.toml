[package]
name = "snapbolt-core"
version = "0.3.0"
edition = "2021"
description = "Core logic for snapbolt image optimization"
license = "MIT"

[dependencies]
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp"] }
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# webp crate uses libwebp-sys (C FFI) — only for native targets, not wasm32
webp = { version = "0.3", optional = true }
# ravif: pure-Rust AVIF encoder via AV1 (rav1e). default-features = false disables rayon
# (parallel encoding), which is required for wasm32-unknown-unknown.
ravif = { version = "0.11", optional = true, default-features = false }
rgb = { version = "0.8", optional = true }

[features]
default = []
# Pure-Rust AVIF encoding via ravif + rav1e. Works on both native and wasm32.
avif = ["ravif", "rgb"]
# Native-only: lossy WebP via libwebp-sys (C FFI) + AVIF. Do NOT enable for WASM builds.
native = ["webp", "avif"]

