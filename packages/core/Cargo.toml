[package]
name = "opti-assets-core"
version = "0.1.0"
edition = "2021"
description = "Core logic for opti-assets image optimization"
license = "MIT"

[dependencies]
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp"] }
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[features]
default = []
